        /* Scan-line animation */
        @keyframes scan-line {
            0%   { transform: translateY(0); opacity: 0.9; }
            50%  { opacity: 0.5; }
            100% { transform: translateY(calc(100% - 2px)); opacity: 0.9; }
        }
        .scan-line {
            animation: scan-line 1.8s ease-in-out infinite alternate;
        }
        @media (prefers-reduced-motion: reduce) {
            .scan-line { animation: none; opacity: 0; }
            .animate-spin { animation: none; }
        }
        /* Success text with line breaks */

    <!-- Service Worker Update Handler -->
    <script>
        let refreshing = false;
        const updateNotification = document.getElementById('update-notification');
        const updateBtn = document.getElementById('update-btn');

        // Listen for messages from Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.addEventListener('message', event => {
                if (event.data && event.data.type === 'UPDATE_AVAILABLE') {
                    console.log('🔄 อัปเดตพร้อมใช้:', event.data.message);
                    updateNotification.classList.remove('hidden');
                }
            });
        }

        // Handle update button click
        updateBtn.addEventListener('click', () => {
            if (!refreshing) {
                refreshing = true;

                if ('serviceWorker' in navigator) {
                    navigator.serviceWorker.controller?.postMessage({ type: 'SKIP_WAITING' });
                }

                // Reload after a short delay
                setTimeout(() => {
                    window.location.reload();
                }, 500);
            }
        });

        // Listen for controller change (new service worker activated)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                console.log('✅ Service Worker อัปเดตแล้ว');
                if (refreshing) {
                    // Page will reload automatically
                }
            });
        }
    </script>

    <!-- PWA Install script -->
    <script>
        let deferredPrompt;
        const installBtn = document.getElementById('install-btn');

        window.addEventListener('beforeinstallprompt', (event) => {
            event.preventDefault();
            deferredPrompt = event;
            installBtn.style.display = 'flex';
            console.log('📥 PWA ยังไม่ได้ติดตั้ง - แสดงปุ่มติดตั้ง');
        });

        window.addEventListener('appinstalled', () => {
            console.log('✅ PWA ติดตั้งสำเร็จ');
            installBtn.style.display = 'none';
            deferredPrompt = null;
        });

        if (window.navigator.standalone === true) {
            console.log('✅ กำลังรัน PWA ที่ติดตั้งแล้ว (iOS)');
            installBtn.style.display = 'none';
        }

        installBtn.addEventListener('click', async () => {
            if (!deferredPrompt) {
                console.warn('⚠️ ไม่สามารถติดตั้ง PWA ได้');
                return;
            }
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            console.log(`👤 ผู้ใช้เลือก: ${outcome}`);
            deferredPrompt = null;
        });
    </script>

    <!-- Connection Status Monitor -->
    <script>
        const connectionStatus = document.getElementById('connection-status');

        const updateConnectionStatus = () => {
            const isOnline = navigator.onLine;
            if (isOnline) {
                connectionStatus.textContent = 'ออนไลน์';
                connectionStatus.classList.remove('text-text-muted', 'bg-bg-card', 'border', 'border-border-subtle');
                connectionStatus.classList.add('text-brand-cyan', 'bg-bg-input');
                console.log('✅ เชื่อมต่ออินเตอร์เน็ตแล้ว');
                window.syncOfflineData?.();
            } else {
                connectionStatus.textContent = 'ออฟไลน์';
                connectionStatus.classList.remove('text-brand-cyan', 'bg-bg-input');
                connectionStatus.classList.add('text-text-muted', 'bg-bg-card', 'border', 'border-border-subtle');
                console.log('❌ ไม่เชื่อมต่ออินเตอร์เน็ต');
            }
        };

        window.addEventListener('online', updateConnectionStatus);
        window.addEventListener('offline', updateConnectionStatus);

        // Initial check
        updateConnectionStatus();
    </script>

        let scannedEquipment = null;
        let isTorchOn = false;
        // Preserved across save errors so Retry can reuse form data
        let pendingData = null;
        let currentErrorType = 'camera'; // 'camera' | 'save'
        let successDismissTimer = null;
        const RECORDER_NAME_STORAGE_KEY = 'bedTrackerRecorderName';
        const GOOGLE_APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx_g-xZYndPu9IzaYITUdHQ5ckjxX8dGxkB6qkhVfQxMrmAN7PfN9X7ENbVhXCgEWxCEg/exec'; // Replace with actual URL
        const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

        // Accessibility Modal Helpers (Focus traps and management)
        let activeModal = null;
        let lastActiveElement = null;

        const openModalDialog = (modalEl, focusTarget = null) => {
            lastActiveElement = document.activeElement;
            modalEl.classList.remove('hidden');
            modalEl.setAttribute('aria-hidden', 'false');
            activeModal = modalEl;
            if (focusTarget) {
                setTimeout(() => focusTarget.focus(), 50);
            } else {
                const focusable = modalEl.querySelectorAll('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])');
                if (focusable.length) setTimeout(() => focusable[0].focus(), 50);
            }
        };

        const closeModalDialog = (modalEl) => {
            modalEl.classList.add('hidden');
            modalEl.setAttribute('aria-hidden', 'true');
            if (activeModal === modalEl) activeModal = null;
            if (lastActiveElement) {
                lastActiveElement.focus();
                lastActiveElement = null;
            }
        };

        // Trap focus & keyboard escape handler
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && activeModal) {
                if (activeModal === manualBedIdModal) {
                    closeManualBedIdModal();
                } else if (activeModal === errorModal) {
                    closeModalDialog(errorModal);
                    if (currentErrorType === 'camera') startScanner();
                } else if (activeModal === successModal) {
                    dismissSuccessModal();
                } else {
                    closeModalDialog(activeModal);
                }
                e.preventDefault();
                return;
            }

            if (e.key === 'Tab' && activeModal) {
                const focusable = activeModal.querySelectorAll('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])');
                if (focusable.length === 0) return;
                const first = focusable[0];
                const last = focusable[focusable.length - 1];

                if (e.shiftKey) {
                    if (document.activeElement === first) {
                        last.focus();
                        e.preventDefault();
                    }
                } else {
                    if (document.activeElement === last) {
                        first.focus();
                        e.preventDefault();
                    }
                }
            }
        });

        // Premium Custom Toast Notification System
        const showToast = (message) => {
            let toast = document.getElementById('app-toast-notification');
            if (!toast) {
                toast = document.createElement('div');
                toast.id = 'app-toast-notification';
                toast.setAttribute('role', 'alert');
                toast.setAttribute('aria-live', 'assertive');
                toast.className = 'fixed bottom-28 left-1/2 -translate-x-1/2 bg-bg-card text-text-error border border-border-subtle px-6 py-3 rounded-lg shadow-lg font-bold z-[60] text-center transition-all duration-300 transform translate-y-10 opacity-0 pointer-events-none max-w-sm w-[90%]';
                document.body.appendChild(toast);
            }
            toast.textContent = message;
            toast.classList.remove('translate-y-10', 'opacity-0', 'pointer-events-none');
            toast.classList.add('translate-y-0', 'opacity-100');
            
            if (window.toastTimeout) {
                clearTimeout(window.toastTimeout);
            }
            window.toastTimeout = setTimeout(() => {
                toast.classList.add('translate-y-10', 'opacity-0', 'pointer-events-none');
                toast.classList.remove('translate-y-0', 'opacity-100');
            }, 3000);
        };

        const saveRecorderName = (name) => {
            const trimmedName = String(name || '').trim();
            if (!trimmedName) {
                return;
            }
            localStorage.setItem(RECORDER_NAME_STORAGE_KEY, trimmedName);
        };

        const loadSavedRecorderName = () => {
            const savedName = String(localStorage.getItem(RECORDER_NAME_STORAGE_KEY) || '').trim();
            if (!savedName) {
                return;
            }

            recorderInput.value = savedName;
        };

        const getActiveVideoTrack = () => {
            const stream = video.srcObject;
            if (!(stream instanceof MediaStream)) {
                return null;
            }

            const [track] = stream.getVideoTracks();
            return track || null;
        };

        const isTorchSupported = (track) => {
            if (!track) {
                return false;
            }

            if (typeof track.getCapabilities === 'function') {
                const capabilities = track.getCapabilities();

                if (typeof capabilities?.torch === 'boolean') {
                    return capabilities.torch;
                }
            }

            // Fallback for some mobile browsers: if this is rear camera, allow showing the toggle.
            if (typeof track.getSettings === 'function') {
                const settings = track.getSettings();
                if (settings?.facingMode === 'environment') {
                    return true;
                }
            }

            return false;
        };

        const updateFlashToggleButton = () => {
            const track = getActiveVideoTrack();
            const supported = isTorchSupported(track);

            if (!supported) {
                quickFlashBtn.classList.add('hidden');
                quickFlashBtn.classList.remove('flex');
                isTorchOn = false;
                return;
            }

            quickFlashBtn.classList.remove('hidden');
            quickFlashBtn.classList.add('flex');
            quickFlashBtn.classList.toggle('bg-bg-card', !isTorchOn);
            quickFlashBtn.classList.toggle('hover:bg-bg-input', !isTorchOn);
            quickFlashBtn.classList.toggle('border-border-subtle', !isTorchOn);
            quickFlashBtn.classList.toggle('bg-brand-yellow', isTorchOn);
            quickFlashBtn.classList.toggle('hover:bg-brand-yellow/80', isTorchOn);
            quickFlashBtn.classList.toggle('border-brand-yellow', isTorchOn);
            // Sync aria-pressed so screen readers know torch state
            quickFlashBtn.setAttribute('aria-pressed', String(isTorchOn));
        };

        const refreshFlashToggleButton = async () => {
            // On mobile, video track/capabilities may be available slightly after scanner.start().
            for (let attempt = 0; attempt < 10; attempt++) {
                updateFlashToggleButton();

                if (!quickFlashBtn.classList.contains('hidden')) {
                    return;
                }

                await sleep(180);
            }
        };

        const setTorchState = async (enabled) => {
            const track = getActiveVideoTrack();

            if (!isTorchSupported(track)) {
                isTorchOn = false;
                updateFlashToggleButton();
                return;
            }

            await track.applyConstraints({
                advanced: [{ torch: enabled }]
            });

            isTorchOn = enabled;
            updateFlashToggleButton();
        };

        const toggleFlash = async () => {
            try {
                await setTorchState(!isTorchOn);
            } catch (error) {
                console.error('❌ ไม่สามารถเปลี่ยนสถานะแฟลชได้:', error);
                showToast('ไม่สามารถเปลี่ยนสถานะแฟลชได้ โปรดลองอีกครั้ง');
            }
        };

        const normalizeHeader = (value) => String(value || '')
            .trim()
            .toLowerCase()
            .replace(/\s+/g, '')
            .replace(/[^a-z0-9]/g, '');

        const getValueByCandidates = (row, candidates) => {
            const keys = Object.keys(row);
            for (const key of keys) {
                const normalizedKey = normalizeHeader(key);
                if (candidates.includes(normalizedKey)) {
                    return String(row[key] ?? '').trim();
                }
            }
            return '';
        };

        const loadEquipmentData = async () => {
            try {
                const response = await fetch('./equipment_list.xlsx', { cache: 'no-store' });
                if (!response.ok) {
                    throw new Error(`โหลดไฟล์ equipment_list.xlsx ไม่สำเร็จ (HTTP ${response.status})`);
                }

                const buffer = await response.arrayBuffer();
                const workbook = XLSX.read(buffer, { type: 'array' });
                const firstSheetName = workbook.SheetNames[0];
                const firstSheet = workbook.Sheets[firstSheetName];

                const rows = XLSX.utils.sheet_to_json(firstSheet, { defval: '' });
                const map = new Map();

                for (const row of rows) {
                    const itemNo = getValueByCandidates(row, ['itemno']);
                    if (!itemNo) {
                        continue;
                    }

                    map.set(itemNo, {
                        image: getValueByCandidates(row, ['image']),
                        itemNo,
                        idCode: getValueByCandidates(row, ['idcode'])
                    });
                }

                equipmentDataByItemNo = map;
                console.log(`✅ โหลดข้อมูลอุปกรณ์สำเร็จ: ${equipmentDataByItemNo.size} รายการ`);
            } catch (error) {
                console.error('❌ โหลดข้อมูล equipment_list.xlsx ไม่สำเร็จ:', error);
                showToast('ไม่สามารถโหลดข้อมูล Excel ได้ โปรดตรวจสอบไฟล์และลองใหม่อีกครั้ง');
            }
        };

        const parseScannedCode = (rawValue) => {
            try {
                const urlObj = new URL(rawValue);
                const code = urlObj.searchParams.get('code');
                if (!code || !code.trim()) {
                    return null;
                }
                return code.trim();
            } catch {
                return null;
            }
        };

        const handleScannedRawValue = (rawValue, source = 'กล้อง') => {
            const scannedCode = parseScannedCode(rawValue);

            if (!scannedCode) {
                showToast('qrcode ไม่ถูกต้อง');
                return false;
            }

            const equipment = equipmentDataByItemNo.get(scannedCode);
            if (!equipment) {
                showToast(`ไม่พบข้อมูลอุปกรณ์สำหรับ code: ${scannedCode}`);
                return false;
            }

            scannedBedId = equipment.idCode;
            scannedEquipment = equipment;

            scanner?.pause(true);
            showFormSection();

            if (navigator.vibrate) {
                navigator.vibrate(200);
            }

            return true;
        };

        const extractScanResultData = (result) => {
            if (typeof result === 'string') {
                return result;
            }

            if (result && typeof result.data === 'string') {
                return result.data;
            }

            return '';
        };

        const renderEquipmentDetail = (equipment) => {
            if (!equipment) {
                equipmentDetailCard.classList.add('hidden');
                equipmentImage.classList.add('hidden');
                equipmentImage.removeAttribute('src');
                equipmentImagePlaceholder.classList.remove('hidden');
                equipmentIdCode.textContent = '-';
                return;
            }

            equipmentDetailCard.classList.remove('hidden');
            equipmentIdCode.textContent = equipment.idCode || '-';

            if (equipment.image) {
                equipmentImage.src = equipment.image;
                equipmentImage.classList.remove('hidden');
                equipmentImagePlaceholder.classList.add('hidden');
            } else {
                equipmentImage.classList.add('hidden');
                equipmentImage.removeAttribute('src');
                equipmentImagePlaceholder.classList.remove('hidden');
            }
        };

        const initScanner = () => {
            scanner = new QrScanner(video, result => {
                handleScannedRawValue(result.data, 'กล้อง');
            }, {
                highlightScanRegion: false,
                returnDetailedScanResult: true,
                preferredCamera: 'environment'
            });

            startScanner();
        };

        const startScanner = async () => {
            if (scannerStatusText) scannerStatusText.textContent = 'กำลังเริ่มกล้อง...';
            try {
                await scanner.start();
                if (scannerStatusText) scannerStatusText.textContent = '';
                await refreshFlashToggleButton();
            } catch (error) {
                if (scannerStatusText) scannerStatusText.textContent = '';
                console.error('❌ เริ่มการสแกนไม่สำเร็จ:', error);
                handleCameraError(error);
            }
        };

        const handleCameraError = (error) => {
            let errorMessage = '';
            console.error('🚨 Camera Error:', {
                name: error.name,
                message: error.message,
                fullError: error
            });

            if (error.name === 'NotAllowedError') {
                errorMessage = '⚠️ กรุณาอนุญาตการใช้งานกล้อง\nตรวจสอบในตั้งค่าเบราว์เซอร์';
            } else if (error.name === 'NotFoundError') {
                errorMessage = '❌ ไม่พบกล้องในอุปกรณ์นี้\nตรวจสอบว่ากล้องเชื่อมต่ออยู่';
            } else if (error.name === 'NotSupportedError') {
                errorMessage = '❌ เบราว์เซอร์นี้ไม่รองรับการใช้งานกล้อง\nลองใช้เบราว์เซอร์อื่น';
            } else if (error.name === 'SecurityError') {
                errorMessage = '🔒 ไม่สามารถใช้งานกล้องบนโปรโตคอล HTTP\nใช้ HTTPS หรือ localhost เท่านั้น';
            } else {
                errorMessage = `❌ เข้าถึงกล้องไม่ได้\n${error.message || 'โปรดลองอีกครั้ง'}`;
            }

            currentErrorType = 'camera';
            errorTitle.textContent = 'เข้าถึงกล้องไม่ได้';
            errorText.textContent = errorMessage;
            // Show manual-entry escape for camera errors
            errorManualEntryBtn.classList.remove('hidden');
            openModalDialog(errorModal, retryBtn);
            quickFlashBtn.classList.add('hidden');
            quickFlashBtn.classList.remove('flex');
            isTorchOn = false;
        };

        const showFormSection = () => {
            if (isTorchOn) {
                setTorchState(false).catch(error => {
                    console.warn('⚠️ ปิดแฟลชไม่สำเร็จก่อนเข้าแบบฟอร์ม:', error);
                });
            }
            quickFlashBtn.classList.add('hidden');
            quickFlashBtn.classList.remove('flex');

            scannerSection.classList.add('hidden');
            formSection.style.display = 'flex';
            bedIdDisplay.textContent = scannedBedId;
            if (scannedEquipment) {
                scannedBedSection.classList.add('hidden');
            } else {
                scannedBedSection.classList.remove('hidden');
            }
            renderEquipmentDetail(scannedEquipment);
            // Scroll room input into view after keyboard opens on mobile
            setTimeout(() => {
                roomInput.focus();
                roomInput.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 100);
        };

        const showManualBedIdModal = () => {
            scanner.pause(true);
            scannerSection.classList.add('hidden');
            openModalDialog(manualBedIdModal, manualBedIdInput);
            manualBedIdInput.value = '';
            console.log('📝 แสดง Modal ระบุเลขเตียง');
        };

        const closeManualBedIdModal = () => {
            closeModalDialog(manualBedIdModal);
            scannerSection.classList.remove('hidden');
            startScanner();
        };

        const submitManualBedId = () => {
            const bedId = manualBedIdInput.value.trim();

            if (!bedId) {
                showToast('⚠️ กรุณาระบุเลขเตียง');
                manualBedIdInput.focus();
                return;
            }

            // Safe suffix-match — avoids regex injection from user input
            const bedIdLower = bedId.toLowerCase();
            let foundEquipment = null;
            for (const equipment of equipmentDataByItemNo.values()) {
                if (equipment.idCode.toLowerCase().endsWith(bedIdLower)) {
                    foundEquipment = equipment;
                    break;
                }
            }

            if (!foundEquipment) {
                console.warn(`⚠️ ไม่พบข้อมูลอุปกรณ์สำหรับเลขเตียง: ${bedId}`);
                showToast(`ไม่พบข้อมูลสำหรับเลขเตียง: ${bedId}`);
                manualBedIdInput.focus();
                return;
            }

            scannedBedId = foundEquipment.idCode;
            scannedEquipment = foundEquipment;
            closeModalDialog(manualBedIdModal);
            showFormSection();

            if (navigator.vibrate) {
                navigator.vibrate(200);
            }
        };

        const backToScanner = () => {
            formSection.style.display = 'none';
            scannerSection.classList.remove('hidden');
            scannedBedId = null;
            scannedEquipment = null;
            pendingData = null;
            scannedBedSection.classList.remove('hidden');
            bedIdDisplay.textContent = '--';
            roomInput.value = '';
            // Clear any validation error styling
            roomInput.classList.remove('border-border-error');
            recorderInput.classList.remove('border-border-error');
            loadSavedRecorderName();
            renderEquipmentDetail(null);
            startScanner();
        };

        const dismissSuccessModal = () => {
            if (successDismissTimer) { clearTimeout(successDismissTimer); successDismissTimer = null; }
            closeModalDialog(successModal);
            backToScanner();
        };

        const isOnline = () => navigator.onLine;

        const saveToLocalStorage = (data) => {
            try {
                const queue = JSON.parse(localStorage.getItem('bedTrackerQueue') || '[]');
                queue.push({
                    ...data,
                    timestamp: new Date().toISOString(),
                    synced: false
                });
                localStorage.setItem('bedTrackerQueue', JSON.stringify(queue));
                return true;
            } catch (error) {
                console.error('ไม่สามารถบันทึกลง Local Storage:', error);
                return false;
            }
        };

        const sendToGoogleAppsScript = async (data) => {
            try {
                loadingText.textContent = 'กำลังส่งข้อมูล...';
                openModalDialog(loadingModal);

                const body = new URLSearchParams({
                    action: 'bed',
                    bedId: data.bedId,
                    roomId: data.roomId,
                    recorderName: data.recorderName,
                    timestamp: data.timestamp
                });

                const response = await fetch(GOOGLE_APPS_SCRIPT_URL, {
                    method: 'POST',
                    body,
                    // no-cors needed for cross-origin GAS; response body is opaque but
                    // a network failure will still throw and be caught below.
                    mode: 'no-cors'
                });

                // In no-cors mode the response type is 'opaque' — we treat any
                // completed fetch (no thrown error) as success.
                void response;

                console.log('✅ ส่งข้อมูลไปยัง Google Apps Script สำเร็จ');
                closeModalDialog(loadingModal);
                return true;
            } catch (error) {
                console.error('❌ ไม่สามารถส่งข้อมูลไปยัง Google Apps Script:', error);
                closeModalDialog(loadingModal);
                return false;
            }
        };

        const syncOfflineData = async () => {
            if (!isOnline()) return;

            try {
                const queue = JSON.parse(localStorage.getItem('bedTrackerQueue') || '[]');

                if (queue.length === 0) {
                    console.log('✅ ไม่มีข้อมูลที่ต้องซิงค์');
                    return;
                }

                for (let i = 0; i < queue.length; i++) {
                    const item = queue[i];
                    const success = await sendToGoogleAppsScript(item);
                    if (success) {
                        queue[i] = undefined;
                    }
                }

                localStorage.setItem('bedTrackerQueue', JSON.stringify(queue.filter(item => item !== undefined)));
            } catch (error) {
                console.error('Sync error:', error);
            }
        };

        window.syncOfflineData = syncOfflineData;

        const setFieldError = (input, hasError) => {
            if (hasError) {
                input.classList.add('border-border-error');
                input.classList.remove('border-border-subtle', 'focus:border-brand-cyan');
            } else {
                input.classList.remove('border-border-error');
                input.classList.add('border-border-subtle', 'focus:border-brand-cyan');
            }
        };

        const handleSave = async () => {
            const roomId = roomInput.value.trim();
            const recorderName = recorderInput.value.trim();

            // Inline field validation with visual feedback
            let hasError = false;
            if (!roomId) {
                setFieldError(roomInput, true);
                if (!hasError) { roomInput.focus(); }
                hasError = true;
            } else {
                setFieldError(roomInput, false);
            }
            if (!recorderName) {
                setFieldError(recorderInput, true);
                if (!hasError) { recorderInput.focus(); }
                hasError = true;
            } else {
                setFieldError(recorderInput, false);
            }
            if (hasError || !scannedBedId) {
                showToast('⚠️ กรุณาระบุข้อมูลให้ครบถ้วน');
                return;
            }

            const data = {
                bedId: scannedBedId,
                roomId: roomId,
                recorderName: recorderName,
                timestamp: new Date().toISOString()
            };
            pendingData = data; // Preserved for save-failure retry

            if (isOnline()) {
                // Online: Send directly
                const success = await sendToGoogleAppsScript(data);
                if (success) {
                    saveRecorderName(recorderName);
                    pendingData = null;
                    successText.textContent = `เตียง ${scannedBedId} → ห้อง ${roomId}\nผู้บันทึก: ${recorderName}`;
                    openModalDialog(successModal, successContinueBtn);
                    // Auto-dismiss after 4 s if user doesn't tap the button
                    successDismissTimer = setTimeout(dismissSuccessModal, 4000);
                } else {
                    currentErrorType = 'save';
                    errorTitle.textContent = 'บันทึกข้อมูลไม่สำเร็จ';
                    errorText.textContent = 'กรุณาตรวจสอบการเชื่อมต่อ แล้วลองบันทึกใหม่';
                    errorManualEntryBtn.classList.add('hidden');
                    openModalDialog(errorModal, retryBtn);
                }
            } else {
                // Offline: Save to Local Storage
                if (saveToLocalStorage(data)) {
                    saveRecorderName(recorderName);
                    pendingData = null;
                    openModalDialog(offlineQueueModal);
                    setTimeout(() => {
                        closeModalDialog(offlineQueueModal);
                        backToScanner();
                    }, 2500);
                } else {
                    currentErrorType = 'save';
                    errorTitle.textContent = 'ไม่สามารถบันทึกข้อมูล';
                    errorText.textContent = 'เกิดข้อผิดพลาดในการบันทึกข้อมูล โปรดลองอีกครั้ง';
                    errorManualEntryBtn.classList.add('hidden');
                    openModalDialog(errorModal, retryBtn);
                }
            }
        };

        skipScanBtn.addEventListener('click', showManualBedIdModal);

        quickFlashBtn.addEventListener('click', toggleFlash);

        manualBedIdSubmitBtn.addEventListener('click', submitManualBedId);

        manualBedIdCloseBtn.addEventListener('click', closeManualBedIdModal);

        manualBedIdInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                submitManualBedId();
            }
        });

        saveBtn.addEventListener('click', handleSave);

        backBtn.addEventListener('click', backToScanner);

        // Enter key submits from room and recorder inputs
        roomInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') { e.preventDefault(); handleSave(); }
        });
        recorderInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') { e.preventDefault(); handleSave(); }
        });

        // Clear field error styling on input
        roomInput.addEventListener('input', () => setFieldError(roomInput, false));
        recorderInput.addEventListener('input', () => setFieldError(recorderInput, false));

        // Success modal dismiss button
        successContinueBtn.addEventListener('click', dismissSuccessModal);

        // Error modal retry — differentiated by error type
        retryBtn.addEventListener('click', () => {
            closeModalDialog(errorModal);
            if (currentErrorType === 'camera') {
                startScanner();
            } else {
                // Save error: retry the save with preserved data, don't lose form
                if (pendingData) {
                    handleSave();
                } else {
                    // Fallback: no pending data (e.g. localStorage error), back to scanner
                    backToScanner();
                }
            }
        });

        // Camera error: manual entry escape button
        errorManualEntryBtn.addEventListener('click', () => {
            closeModalDialog(errorModal);
            // Show scanner section so modal context is correct, then open manual modal
            scannerSection.classList.remove('hidden');
            showManualBedIdModal();
        });

        // Initialize scanner on page load
        loadSavedRecorderName();
        await loadEquipmentData();
        initScanner();

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js').catch(error => {
                    console.error('❌ ลงทะเบียน Service Worker ไม่สำเร็จ:', error);
                });
            });
        }

        // Global error handler
        window.addEventListener('error', (event) => {
            console.error('🔴 Global Error:', {
                message: event.message,
                filename: event.filename,
                lineno: event.lineno,
                colno: event.colno,
                error: event.error
            });
        });

        window.addEventListener('unhandledrejection', (event) => {
            console.error('🔴 Unhandled Promise Rejection:', event.reason);
        });
    </script>
</body>

</html>
