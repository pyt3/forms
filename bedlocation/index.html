<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1d4ed8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="BedTracker">
    <link rel="manifest" href="./manifest.json">
    <link rel="icon" href="./icon.svg" type="image/svg+xml">
    <title>BedTracker Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"
        integrity="sha256-/xUj+3OJ+Y6k5xR2vNhbbX6YsJhBKt3vnDnNQfXlBxQ=" crossorigin="anonymous"></script>
</head>

<body class="bg-slate-50 font-sans text-slate-900 h-screen flex flex-col">
    <header class="p-6 bg-white shadow-md flex items-center justify-between">
        <h1 class="text-3xl font-black text-blue-700">BedTracker</h1>
        <span class="text-lg font-bold text-emerald-600 bg-emerald-100 px-4 py-1 rounded-full">ออนไลน์</span>
    </header>

    <main class="flex-1 p-6 max-w-lg mx-auto w-full flex flex-col space-y-8">
        <div class="relative w-full aspect-square rounded-[2rem] overflow-hidden shadow-2xl bg-black border-4 border-white">
            <video id="qr-video" class="w-full h-full object-cover" playsinline muted></video>
            <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                <div class="w-[70%] aspect-square relative">
                    <div class="absolute top-0 left-0 w-12 h-12 border-t-4 border-l-4 border-white rounded-tl-2xl"></div>
                    <div class="absolute top-0 right-0 w-12 h-12 border-t-4 border-r-4 border-white rounded-tr-2xl"></div>
                    <div class="absolute bottom-0 left-0 w-12 h-12 border-b-4 border-l-4 border-white rounded-bl-2xl"></div>
                    <div class="absolute bottom-0 right-0 w-12 h-12 border-b-4 border-r-4 border-white rounded-br-2xl"></div>
                </div>
            </div>
        </div>

        <div class="bg-white p-6 rounded-3xl shadow-lg border-2 border-blue-100">
            <label class="text-sm font-bold uppercase text-slate-500 tracking-wider" for="room-input">ระบุเลขห้อง</label>
            <input type="text" id="room-input" placeholder="ระบุเลขห้อง..."
                class="w-full mt-3 text-4xl font-black bg-slate-100 p-4 rounded-xl outline-none text-blue-800 placeholder:text-slate-300">
        </div>
    </main>

    <div id="success-modal" class="hidden fixed inset-0 bg-blue-600 z-50 flex items-center justify-center p-8">
        <div class="text-white text-center">
            <div class="text-9xl mb-6">✅</div>
            <h2 class="text-5xl font-black">บันทึกสำเร็จ!</h2>
            <p id="feedback-text" class="mt-6 text-3xl font-bold text-blue-100"></p>
        </div>
    </div>

    <div id="error-modal" class="hidden fixed inset-0 bg-red-600 z-50 flex items-center justify-center p-8">
        <div class="text-white text-center">
            <div class="text-9xl mb-6">⚠️</div>
            <h2 class="text-4xl font-black">เข้าถึงกล้องไม่ได้</h2>
            <p id="error-text" class="mt-6 text-2xl font-bold text-red-100"></p>
            <button id="retry-btn" class="mt-8 bg-white text-red-600 px-8 py-3 rounded-xl font-bold text-xl hover:bg-red-50">
                ลองอีกครั้ง
            </button>
        </div>
    </div>

    <script type="module">
        import QrScanner from "https://cdn.jsdelivr.net/npm/qr-scanner@1.4.2/qr-scanner.min.js";

        const video = document.getElementById('qr-video');
        const modal = $('#success-modal');
        const errorModal = $('#error-modal');
        const errorText = $('#error-text');
        const retryBtn = $('#retry-btn');

        let scanner = null;

        const parseBedId = (rawValue) => {
            try {
                const urlObj = new URL(rawValue);
                return urlObj.searchParams.get('code') || rawValue;
            } catch {
                return rawValue;
            }
        };

        const initScanner = () => {
            scanner = new QrScanner(video, result => {
                const roomId = $('#room-input').val().toString().trim();

                if (!roomId) {
                    alert('กรุณาระบุเลขห้องก่อนสแกน');
                    return;
                }

                const bedId = parseBedId(result.data).trim();
                if (!bedId) {
                    return;
                }

                scanner.pause(true);
                $('#feedback-text').text(`เตียง ${bedId} -> ห้อง ${roomId}`);
                modal.removeClass('hidden');

                if (navigator.vibrate) {
                    navigator.vibrate(500);
                }

                setTimeout(() => {
                    modal.addClass('hidden');
                    scanner.start().catch(error => {
                        console.error('เริ่มสแกนอีกครั้งไม่สำเร็จ:', error);
                        handleCameraError(error);
                    });
                }, 2500);
            }, { highlightScanRegion: false, returnDetailedScanResult: true });

            startScanner();
        };

        const startScanner = () => {
            scanner.start().catch(error => {
                console.error('เริ่มการสแกนไม่สำเร็จ:', error);
                handleCameraError(error);
            });
        };

        const handleCameraError = (error) => {
            let errorMessage = '';
            
            if (error.name === 'NotAllowedError') {
                errorMessage = '⚠️ กรุณาอนุญาตการใช้งานกล้อง\nตรวจสอบในตั้งค่าเบราว์เซอร์';
            } else if (error.name === 'NotFoundError') {
                errorMessage = '❌ ไม่พบกล้องในอุปกรณ์นี้\nตรวจสอบว่ากล้องเชื่อมต่ออยู่';
            } else if (error.name === 'NotSupportedError') {
                errorMessage = '❌ เบราว์เซอร์นี้ไม่รองรับการใช้งานกล้อง\nลองใช้เบราว์เซอร์อื่น (Chrome, Firefox, Safari)';
            } else if (error.name === 'SecurityError') {
                errorMessage = '🔒 ไม่สามารถใช้งานกล้องบนโปรโตคอล HTTP\nใช้ HTTPS หรือ localhost เท่านั้น';
            } else {
                errorMessage = `❌ เข้าถึงกล้องไม่ได้\n${error.message || 'โปรดลองอีกครั้ง'}`;
            }
            
            errorText.text(errorMessage);
            errorModal.removeClass('hidden');
        };

        retryBtn.on('click', () => {
            errorModal.addClass('hidden');
            startScanner();
        });

        // Initialize scanner on page load
        initScanner();

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js').catch(error => {
                    console.error('ลงทะเบียน Service Worker ไม่สำเร็จ:', error);
                });
            });
        }
    </script>
</body>

</html>
