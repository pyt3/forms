<!DOCTYPE html>
<html lang="th">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>รายการเสนอเซ็นอนุมัติ (RR Scan)</title>
	<script src="https://cdn.tailwindcss.com"></script>
	<link href="https://fastly.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.0/jquery.min.js"></script>
	<script src="https://fastly.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/easyqrcodejs@4.6.2/dist/easy.qrcode.min.js"></script>
	<script src="https://fastly.jsdelivr.net/npm/sweetalert2@11"></script>
	<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@100..900&display=swap" rel="stylesheet">
	<style>
		body { font-family: 'Noto Sans Thai', sans-serif; }
		.signature-box { min-height: 60px; border: 1px dashed #aaa; margin-bottom: 8px; }
	</style>
</head>
<body class="bg-gray-50 min-h-screen">
	<div class="container py-6">
		<div class="flex flex-col items-center mb-6">
			<h1 class="text-2xl font-bold text-red-600 mb-2">รายการเสนอเซ็นอนุมัติ (RR Scan)</h1>
			<div class="w-full max-w-md flex gap-2 mb-4">
				<input id="scan-input" type="text" class="form-control" placeholder="Scan QR หรือกรอกรหัส RR">
				<button id="scan-btn" class="btn btn-danger">ค้นหา</button>
			</div>
		</div>
		<div id="result-area" class="mb-6"></div>
		<div id="table-area" class="mb-6" style="display:none;">
			<h2 class="text-lg font-semibold mb-2">รายการไฟล์เสนอเซ็น</h2>
			<table class="table table-bordered bg-white">
				<thead class="table-light">
					<tr>
						<th>ลำดับ</th>
						<th>ชื่อไฟล์</th>
						<th>วันที่เสนอ</th>
						<th>หมายเหตุ</th>
						<th>เลือก</th>
					</tr>
				</thead>
				<tbody id="file-list"></tbody>
			</table>
			<div class="mt-3 flex gap-2">
				<button id="save-btn" class="btn btn-success">บันทึกวันที่เสนอ</button>
				<button id="print-btn" class="btn btn-primary">Print เอกสารเสนอเซ็น</button>
			</div>
		</div>
		<div id="print-area" style="display:none;">
			<div class="bg-white p-4 rounded shadow max-w-2xl mx-auto">
				<h2 class="text-lg font-bold mb-2">เอกสารเสนอเซ็นอนุมัติ</h2>
				<div id="print-table"></div>
				<div class="grid grid-cols-2 gap-4 mt-6">
					<div>
						<div class="font-semibold">ผู้นำส่ง</div>
						<div class="signature-box"></div>
					</div>
					<div>
						<div class="font-semibold">ผู้รับเอกสาร</div>
						<div class="signature-box"></div>
					</div>
					<div>
						<div class="font-semibold">ผู้ส่งคืน</div>
						<div class="signature-box"></div>
					</div>
					<div>
						<div class="font-semibold">ผู้รับคืน</div>
						<div class="signature-box"></div>
					</div>
				</div>
			</div>
		</div>
	</div>
	<script>
	// Config
	const scriptUrl = 'https://script.google.com/macros/s/AKfycbwQBbvEpNXYqFZBuai4IRpDvy-kR4YeJZFt4KcGdOpMry7SphLRox1JL233Io7jYxfFeA/exec';

	let rrData = null;
	let fileList = [];

	// Scan/Search
	$('#scan-btn').on('click', function() {
		let code = $('#scan-input').val().trim();
		if (!code) return Swal.fire('กรุณากรอกรหัส RR หรือสแกน QR', '', 'warning');
		searchRR(code);
	});
	$('#scan-input').on('keypress', function(e) {
		if (e.which === 13) $('#scan-btn').click();
	});

	function searchRR(code) {
		Swal.fire({ icon: 'info', title: 'ค้นหา...', allowOutsideClick: false, showConfirmButton: false });
		$.getJSON(scriptUrl + '?action=search&search=' + code, function(data) {
			Swal.close();
			if (data.status !== 'success') {
				$('#table-area').hide();
				return Swal.fire('ไม่พบข้อมูล', '', 'error');
			}
			rrData = data.data;
			fileList = data.data.files || [{ name: data.data.rr_no + '.pdf', date: '', note: '' }];
			renderTable();
		});
	}

	function renderTable() {
		$('#table-area').show();
		let html = '';
		fileList.forEach((f, i) => {
			html += `<tr>
				<td>${i + 1}</td>
				<td>${f.name || '-'}</td>
				<td><input type="date" class="form-control form-control-sm" value="${f.date || ''}" data-idx="${i}" /></td>
				<td><input type="text" class="form-control form-control-sm" value="${f.note || ''}" data-idx="${i}" /></td>
				<td><input type="checkbox" class="form-check-input" data-idx="${i}" /></td>
			</tr>`;
		});
		$('#file-list').html(html);
	}

	// Save
	$('#save-btn').on('click', function() {
		// Update fileList from table
		$('#file-list tr').each(function(i) {
			fileList[i].date = $(this).find('input[type="date"]').val();
			fileList[i].note = $(this).find('input[type="text"]').val();
		});
		// Save to backend (simulate)
		if (!rrData) return;
		Swal.fire({ icon: 'info', title: 'กำลังบันทึก...', allowOutsideClick: false, showConfirmButton: false });
		$.ajax({
			url: scriptUrl,
			type: 'POST',
			data: { opt: 'save', form_obj: JSON.stringify({ ...rrData, files: fileList }) },
			success: function() {
				Swal.fire('บันทึกสำเร็จ', '', 'success');
			},
			error: function() {
				Swal.fire('เกิดข้อผิดพลาด', '', 'error');
			}
		});
	});

	// Print
	$('#print-btn').on('click', function() {
		// Update fileList from table
		$('#file-list tr').each(function(i) {
			fileList[i].date = $(this).find('input[type="date"]').val();
			fileList[i].note = $(this).find('input[type="text"]').val();
		});
		// Render print area
		let html = `<table class="table table-bordered">
			<thead><tr><th>ลำดับ</th><th>ชื่อไฟล์</th><th>วันที่เสนอ</th><th>หมายเหตุ</th></tr></thead><tbody>`;
		fileList.forEach((f, i) => {
			html += `<tr><td>${i + 1}</td><td>${f.name || '-'}</td><td>${f.date || '-'}</td><td>${f.note || '-'}</td></tr>`;
		});
		html += '</tbody></table>';
		$('#print-table').html(html);
		$('#print-area').show();
		setTimeout(() => { window.print(); $('#print-area').hide(); }, 500);
	});
	</script>
</body>
</html>
